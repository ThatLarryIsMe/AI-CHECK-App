name: Bug report
description: Report a defect with reproducible details.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: Brief description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Submit ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error text
      description: Paste exact errors from browser console, API response, or Vercel logs.
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - verify flow
        - pack page
        - export
        - admin stats
        - deployment
        - other
    validations:
      required: true
